dataset:
  root: 'data'
  # Toxicity/safety endpoints — trained jointly in the GNN/DMPNN ensemble.
  names: [tox21, clintox, sider, ames, cyp450, herg, dili]
  # Pharmacological activity endpoints — RF fingerprint model only (train_activity.py).
  activity_names: [bbbp, hiv]
model:
  type: dmpnn
  hidden_channels: 256
  task_dim: 64
  fp_dim: 64
  fp_bits: 679      # Morgan(512) + MACCS(167)
  ensemble_size: 4
  depth: 4
training:
  batch_size: 64
  learning_rate: 0.0003
  epochs: 120
  early_stopping_patience: 18
  dataset_weights:
    tox21:   1.0
    clintox: 4.0
    sider:   5.0
    ames:    2.0
    cyp450:  1.5
    herg:    3.0
    dili:    4.0
