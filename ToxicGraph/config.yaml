dataset:
  root: 'data'
  names: [tox21, clintox, sider, cyp450, ames, bbbp, hiv]
model:
  type: dmpnn    # gnn | dmpnn
  hidden_channels: 128
  task_dim: 64    # task embedding size for task-conditioned readout
  ensemble_size: 3
  depth: 4        # message passing steps (dmpnn) / conv layers (gnn)
training:
  batch_size: 64
  learning_rate: 0.0003
  epochs: 120
  early_stopping_patience: 10
