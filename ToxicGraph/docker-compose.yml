services:
  toxicgraph:
    build: .
    ports:
      - "8000:8000"
    volumes:
      # model weights + precomputed cache (test_probs.npy etc.)
      - ./checkpoints:/app/checkpoints
      # raw + processed dataset files (not needed if precompute_cache.py was run)
      - ./data:/app/data
    restart: unless-stopped
    env_file: .env
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
